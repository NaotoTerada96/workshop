<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ポモドーロタイマー</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
  <div class="window">
    <div class="titlebar">
      <span class="titlebar__title">ポモドーロタイマー</span>
      <div class="titlebar__controls">
        <span>－</span>
        <span>□</span>
        <span>×</span>
      </div>
    </div>

    <div class="timer-section">
      <div class="mode-label">作業中</div>

      <div class="progress-ring-wrapper">
        <svg class="progress-ring" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
          <!-- 背景トラック -->
          <circle
            class="progress-ring__track"
            cx="80" cy="80" r="66"
            fill="none"
            stroke-width="12"
          />
          <!-- 進捗バー -->
          <circle
            class="progress-ring__bar"
            cx="80" cy="80" r="66"
            fill="none"
            stroke-width="12"
            stroke-linecap="round"
            stroke-dasharray="414.69"
            stroke-dashoffset="0"
            transform="rotate(-90 80 80)"
          />
        </svg>
        <div class="timer-display">25:00</div>
      </div>

      <div class="button-group">
        <button class="btn btn--primary" id="btn-start">開始</button>
        <button class="btn btn--secondary" id="btn-reset">リセット</button>
      </div>
    </div>

    <div class="stats-section">
      <div class="stats-section__title">今日の進捗</div>
      <div class="stats-section__body">
        <div class="stat">
          <div class="stat__value">4</div>
          <div class="stat__label">完了</div>
        </div>
        <div class="stat stat--accent">
          <div class="stat__value">1時間40分</div>
          <div class="stat__label">集中時間</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
